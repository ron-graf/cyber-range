---
- name: Configure DMZ Web Server
  hosts: dmz
  become: true
  tasks:
    - name: Install web server dependencies
      apt:
        name:
          - python3-pip
          - python3-venv
          - nginx
        state: present

    - name: Create app directory
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/smallco
        - /opt/smallco/files

    - name: Copy vulnerable web app
      copy:
        src: "{{ playbook_dir }}/../../apps/vulnerable-web/app.py"
        dest: /opt/smallco/app.py
        mode: "0644"

    - name: Copy requirements
      copy:
        src: "{{ playbook_dir }}/../../apps/vulnerable-web/requirements.txt"
        dest: /opt/smallco/requirements.txt

    - name: Copy shared files
      copy:
        src: "{{ playbook_dir }}/../../apps/vulnerable-web/files/"
        dest: /opt/smallco/files/

    - name: Create Python venv and install deps
      shell: |
        python3 -m venv /opt/smallco/venv
        /opt/smallco/venv/bin/pip install -r /opt/smallco/requirements.txt
      args:
        creates: /opt/smallco/venv/bin/gunicorn

    - name: Initialize the database
      shell: /opt/smallco/venv/bin/python /opt/smallco/app.py &
      async: 5
      poll: 0
      ignore_errors: true

    - name: Wait then kill init process
      shell: sleep 2 && pkill -f "python /opt/smallco/app.py" || true

    - name: Create systemd service for portal
      copy:
        dest: /etc/systemd/system/smallco-portal.service
        content: |
          [Unit]
          Description=SmallCo Internal Portal
          After=network.target

          [Service]
          Type=simple
          ExecStart=/opt/smallco/venv/bin/gunicorn --bind 0.0.0.0:8080 --chdir /opt/smallco app:app
          Restart=always
          User=www-data
          Environment=PYTHONPATH=/opt/smallco

          [Install]
          WantedBy=multi-user.target

    - name: Fix permissions for www-data
      file:
        path: /opt/smallco
        owner: www-data
        group: www-data
        recurse: yes

    - name: Enable and start portal
      systemd:
        name: smallco-portal
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80 default_server;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
      notify: Restart nginx

    - name: Create backups directory
      file:
        path: /opt/backups
        state: directory
        mode: "0755"

    - name: Plant credential breadcrumb
      copy:
        dest: /opt/backups/config.ini
        content: |
          [database]
          host = 10.0.2.20
          port = 3306
          user = svc_backup
          password = Backup2026!
          database = smallco_db

          [file-server]
          host = 10.0.2.30
          user = svc_backup
          ssh_key = /home/svc_backup/.ssh/id_rsa
        mode: "0644"

    - name: Create svc_backup user on web server
      user:
        name: svc_backup
        password: "{{ 'Backup2026!' | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes

  handlers:
    - name: Restart nginx
      systemd:
        name: nginx
        state: restarted
